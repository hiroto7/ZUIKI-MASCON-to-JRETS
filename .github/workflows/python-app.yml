# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  APP_NAME: ZUIKI-MASCON-to-JRETS

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Format check with Ruff
        run: uv run ruff format --check .
      - name: Type check with basedpyright
        run: uv run basedpyright --warnings
      - name: Test with pytest
        run: uv run pytest

  package-macos:
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Embed build version
        env:
          BUILD_REF: ${{ github.ref_name }}
          BUILD_SHA: ${{ github.sha }}
        run: python scripts/embed_build_version.py
      - name: Package macOS app
        run: ./scripts/package_macos_app.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_NAME }}.app
          path: dist/${{ env.APP_NAME }}.app.zip
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ env.APP_NAME }}.app.zip
          make_latest: true
