# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  APP_NAME: ZUIKI-MASCON-to-JRETS

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 \
            libcairo2-dev \
            libgirepository-2.0-dev \
            libgirepository1.0-dev
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Format check with Ruff
        run: uv run ruff format --check .
      - name: Type check with basedpyright
        run: uv run basedpyright --warnings
      - name: Test with pytest
        run: uv run pytest

  visual-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci
      - name: Visual regression test
        run: npm run test:vrt:container
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-test-results
          path: test-results
          if-no-files-found: ignore

  package-macos:
    needs: [test, visual-test]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Embed build version
        env:
          BUILD_REF: ${{ github.ref_name }}
          BUILD_SHA: ${{ github.sha }}
        run: python scripts/embed_build_version.py
      - name: Package macOS app
        run: ./scripts/package_macos_app.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_NAME }}.app
          path: dist/${{ env.APP_NAME }}.app.zip
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ env.APP_NAME }}.app.zip
          make_latest: true
