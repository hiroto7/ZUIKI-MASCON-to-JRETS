# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  APP_NAME: ZUIKI-MASCON-to-JRETS

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uv run flake8 . --exclude .venv --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          uv run flake8 . --exclude .venv --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Format check with black
        run: uv run black --check .
      - name: Type check with basedpyright
        run: uv run basedpyright
      - name: Test with pytest
        run: uv run pytest

  package-macos:
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Embed build version
        env:
          BUILD_REF: ${{ github.ref_name }}
          BUILD_SHA: ${{ github.sha }}
        run: python scripts/embed_build_version.py
      - run: uv run pyinstaller --name "$APP_NAME" --noconsole main.py
      - run: codesign --verify --deep --strict "$APP_NAME.app"
        working-directory: dist
      - run: ditto -c -k --sequesterRsrc --keepParent "$APP_NAME.app" "$APP_NAME.app.zip"
        working-directory: dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_NAME }}.app
          path: dist/${{ env.APP_NAME }}.app.zip
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ env.APP_NAME }}.app.zip
          make_latest: true
